services: 
  nats:
    image: nats:alpine
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: wget http://localhost:8222/healthz -q -S -O -
      start_period: 3s
      retries: 3
      timeout: 3s
      interval: 14s
    networks:
      - gestion_fichier-network-dev
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/27017"]      
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - mongodb-data:/data/db
    networks:
      - gestion_fichier-network-dev

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/notification_db?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gestion_fichier-network-dev

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - gestion_fichier-network-dev
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - gestion_fichier-network-dev
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${MYSQL_USER:-nestjs_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nestjs_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestion_file}
    ports:
      - "3306:3306"
    volumes:
      - db-projet-data:/var/lib/mysql
      - ./init-user.sql:/docker-entrypoint-initdb.d/init-user.sql    
    networks:
      - gestion_fichier-network-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
  phpmyadmin:
    image: phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    ports:
      - 8090:80
    environment:
      PMA_HOST: mysql
      PMA_USER: nestjs_user
      PMA_PASSWORD: nestjs_password
    networks:
      - gestion_fichier-network-dev
  gateway:
    build:
      context: ./gateway
      dockerfile: /Dockerfile.dev
    container_name: gateway-api
    env_file:
      - ./gateway/.env
    ports:
      - "3000:3000"
      - "9229:9229" 
    volumes:
      - ./gateway/src:/app/src
      - ./gateway/prisma:/app/prisma
      - ./gateway/init-db.sh:/app/init-db.sh 
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - gestion_fichier-network-dev
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification
      dockerfile: /Dockerfile
    container_name: notification
    ports:
      - "8082:8082"
    env_file:
      - ./notification/src/main/resources/application.properties 
    depends_on:
      mongo:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gestion_fichier-network-dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  mongodb-data:
  redis-data:
  data:
  db-projet-data:
    driver: local

networks:
  gestion_fichier-network-dev:
    name: gestion_fichier-network-dev
    driver: bridge
stages:
  - test
  - deploy


stage-1:  
  image: node:20           
  stage: test                 
  services:                      
    - docker:dind
  cache:
    paths:
      - node_modules/
  before_script:                 
    - echo "Préparation..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:                        
    - echo "Exécution..."
    - npm i
    - npm run test
  rules:                         
    if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"
    when: manual    

stage-2:  
  image: docker:stable           
  stage: deploy                
  services:                      
    - docker:dind
  before_script:                 
    - echo "Préparation..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:                        
    - echo "Exécution..."
    - docker build -t $CI_REGISTRY_IMAGE:$TAG_STAGING .
    - docker push $CI_REGISTRY_IMAGE:$TAG_STAGING
  rules:                         
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"
    - when: manual                 

build_front:  
  image: docker:stable           
  stage: deploy                
  services:                      
    - docker:dind
  before_script:                 
    - echo "Préparation..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:                        
    - echo "Exécution..."
    - docker build -t $CI_REGISTRY_IMAGE:$TAG_PROD .
    - docker push $CI_REGISTRY_IMAGE:$TAG_PROD
  after_script:                  
    - echo "Nettoyage..."
  rules:                         
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"
    - when: manual                     

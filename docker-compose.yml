services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${MYSQL_USER:-nestjs_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nestjs_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestion_file}
    ports:
      - "3306:3306"
    volumes:
      - db-projet-data:/var/lib/mysql
      - ./init-user.sql:/docker-entrypoint-initdb.d/init-user.sql    
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - 8090:80
    environment:
      PMA_HOST: mysql
      PMA_USER: nestjs_user
      PMA_PASSWORD: nestjs_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-network
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs_api
    ports:
      - "3000:3000"
    env_file:
      - ./.env.production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-network
      - nginx-network
    restart: unless-stopped
  frontend:
    build:
      context: ../gestion-de-donnees_front
      dockerfile: Dockerfile
    container_name: react_app
    ports: 
      - "85:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nginx-network
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - '80:80'
      - '443:443' 
      - '81:81'
    environment:
      DISABLE_IPV6: 'true'
    networks:
      - nginx-network
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

volumes:
  data: 
  letsencrypt:
  db-projet-data:
    driver: local
  

networks:
  backend-network:
    name: backend-network
    driver: bridge
  nginx-network:
    name: nginx-network
    driver: bridge
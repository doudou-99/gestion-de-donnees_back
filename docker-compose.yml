
services: 
  nats:
    image: nats:alpine
    restart: always
    ports:
      - "4222:4222" # client port
      - "8222:8222" # monitoring port
    healthcheck:
      test: wget http://localhost:8222/healthz -q -S -O -
      start_period: 3s
      retries: 3
      timeout: 3s
      interval: 14s
    networks:
      - microservices-network-dev
  mysql:
    image: mysql
    container_name: db_projet
    ports:
      - "3306:3306"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: gestion_file
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - microservices-network-dev
  phpmyadmin:
    image: phpmyadmin
    depends_on:
      - mysql
    restart: always
    ports:
      - 8080:80
    environment:
      PMA_HOST: mysql
    networks:
      - microservices-network-dev
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
    - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet      
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - mongodb-data:/data/db
    networks:
      - microservices-network-dev

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices-network-dev
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - microservices-network-dev
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway-api
    environment:
      NODE_ENV: development
      NATS_URL: nats://nats:4222
      PORT: 3000
      DATABASE_URL: mysql://root:root@mysql:3306/gestion_file
    ports:
      - "3000:3000"
      - "9229:9229" 
    volumes:
      - ./gateway/src:/app/src
      - /app/node_modules
    depends_on:
      - nats
      - mysql
      - notification-service
    networks:
      - microservices-network-dev

  notification-service:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: notification
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NATS_URL=nats://nats:4222
      - SPRING_DATA_MONGODB_URI=mongodb://root:example@mongo:27017/notification_db?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mongo:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-network-dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  mongodb-data:
  redis-data:
  db-data:

networks:
  microservices-network-dev:
    driver: bridge